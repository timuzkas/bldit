name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            asset_name: bldit-linux
          - os: macos-latest
            asset_name: bldit-macos
          - os: windows-latest
            asset_name: bldit-win.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller requests

      - run: pyinstaller bldit.spec

      - run: mv dist/bldit${{ runner.os == 'Windows' && '.exe' || '' }} dist/${{ matrix.asset_name }}
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: bldit-*
          merge-multiple: true
          path: dist/

      - name: Generate changelog
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD~ 2>/dev/null || true)
          if [ -n "$prev" ]; then
            log=$(git log --oneline "$prev"..HEAD)
          else
            log=$(git log --oneline HEAD)
          fi
          echo "## What's Changed" > /tmp/release_body.md
          echo "" >> /tmp/release_body.md
          echo '```' >> /tmp/release_body.md
          echo "$log" >> /tmp/release_body.md
          echo '```' >> /tmp/release_body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release_body.md
          files: dist/*
